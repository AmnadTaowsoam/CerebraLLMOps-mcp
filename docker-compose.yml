# =============================================================================
# CerebraLLMOps-mcp — per-MCP compose (PROD-FLEET-SPLIT — NEW)
#
# Project name: cerebrallmops-mcp
# Containers:
#   - cerebra-llmops-api (port 4300)
# =============================================================================

name: cerebrallmops-mcp

services:

  llmops-api:
    build:
      context: .
      dockerfile: apps/llmops-api/Dockerfile.tsx
    container_name: cerebra-llmops-api
    environment:
      NODE_ENV:      ${NODE_ENV:-development}
      PORT:          4300
      HOST:          0.0.0.0
      DATABASE_URL:  postgresql://${LLMOPS_APP_USER:-llmops_app}:${LLMOPS_APP_PASSWORD:-llmops_app_password}@mcp-postgres:5432/cerebra?options=-csearch_path%3Dllmops%2Cpublic
      INTERNAL_TOKEN: ${INTERNAL_TOKEN:-dev-internal-token}
      LOG_LEVEL:     ${LOG_LEVEL:-info}
    ports:
      - "4300:4300"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4300/health',(r)=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      cerebra-net: {}
      cerebra-shared:
        aliases: [cerebra-llmops-api]
    restart: unless-stopped

networks:
  cerebra-net:
    external: true
    name: cerebra-net
  cerebra-shared:
    external: true
    name: cerebra-shared
